[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # NEXT_PUBLIC_* values are intentionally exposed to the server bundle by Next.js.
  # They are NOT secrets — omitting them from Netlify's scan to prevent false positives.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_APP_URL"

[functions]
  node_bundler = "nft"

[[plugins]]
  package = "@netlify/plugin-nextjs"
